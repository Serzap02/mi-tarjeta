<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tarjeta Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--cream:#f5f0e8;--gold:#c9a84c;--rust:#b5451b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#1a1612;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;background-image:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.08),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(181,69,27,.06),transparent 60%)}
h1.main-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;letter-spacing:.35em;text-transform:uppercase;margin-bottom:32px;opacity:.85}
.editor-wrap{width:min(560px,100%);background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:18px}
.field-row{display:flex;flex-direction:column;gap:6px}
label{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:.75}
input,textarea,select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;width:100%;resize:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}
select option{background:#2a2520;color:#fff}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.photo-zone{display:flex;align-items:center;gap:20px}
.photo-circle{width:88px;height:88px;border-radius:50%;border:2px dashed rgba(201,168,76,.4);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;transition:border-color .2s}
.photo-circle:hover{border-color:var(--gold)}
.photo-circle img{width:100%;height:100%;object-fit:cover;position:absolute;border-radius:50%}
.photo-circle svg{opacity:.35}
.photo-hint{color:rgba(255,255,255,.35);font-size:.8rem;line-height:1.6}
.photo-hint span{color:var(--gold);cursor:pointer}
#fileInput{display:none}
.palette{display:flex;gap:10px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;flex-shrink:0}
.swatch.selected{border-color:#fff;transform:scale(1.2)}
.btn-gen{padding:16px;background:linear-gradient(135deg,var(--gold),var(--rust));border:none;border-radius:12px;color:#fff;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-gen:hover{opacity:.9;transform:translateY(-1px)}

/* QR result */
.result-box{display:none;width:min(560px,100%);background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:28px;flex-direction:column;align-items:center;gap:16px}
.result-box.visible{display:flex}
.result-box h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;letter-spacing:.08em}
.qr-wrap{background:#fff;border-radius:14px;padding:12px;line-height:0}
.qr-wrap img{width:230px;height:230px;display:block;border-radius:6px}
.url-box{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px 16px;color:var(--gold);font-size:.8rem;word-break:break-all;text-align:center;width:100%}
.hint{font-size:.78rem;color:rgba(255,255,255,.35);text-align:center;line-height:1.6}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-sec{padding:11px 24px;background:transparent;border:1px solid var(--gold);border-radius:10px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s}
.btn-sec:hover{background:var(--gold);color:var(--ink)}
@media(max-width:480px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1 class="main-title">✦ Crear Mi Tarjeta</h1>

<div class="editor-wrap">
  <div class="field-row">
    <label>Foto de perfil</label>
    <div class="photo-zone">
      <div class="photo-circle" id="photoCircle" onclick="document.getElementById('fileInput').click()">
        <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="photo-hint">Haz clic para subir tu foto.<br><span onclick="document.getElementById('fileInput').click()">Seleccionar imagen →</span></div>
      <input type="file" id="fileInput" accept="image/*" onchange="loadPhoto(event)">
    </div>
  </div>
  <div class="field-row"><label>Nombre completo *</label><input id="f_name" type="text" placeholder="Ej. Ana García"></div>
  <div class="two-col">
    <div class="field-row"><label>Edad</label><input id="f_age" type="number" min="1" max="120" placeholder="28"></div>
    <div class="field-row"><label>Sexo</label>
      <select id="f_sex">
        <option value="">— Seleccionar —</option>
        <option>Mujer</option><option>Hombre</option><option>No binario</option><option>Prefiero no decirlo</option>
      </select>
    </div>
  </div>
  <div class="field-row"><label>Trabajo / Profesión</label><input id="f_job" type="text" placeholder="Ej. Diseñadora UX"></div>
  <div class="field-row"><label>Red social</label><input id="f_social" type="text" placeholder="@usuario o URL"></div>
  <div class="field-row"><label>Descripción corta</label><textarea id="f_desc" rows="2" maxlength="120" placeholder="Máx. 120 caracteres..."></textarea></div>
  <div class="field-row">
    <label>Color del encabezado</label>
    <div class="palette">
      <div class="swatch selected" style="background:#1a1a2e" onclick="pickColor(this,'#1a1a2e')"></div>
      <div class="swatch" style="background:#0d3b2e" onclick="pickColor(this,'#0d3b2e')"></div>
      <div class="swatch" style="background:#3b1a0d" onclick="pickColor(this,'#3b1a0d')"></div>
      <div class="swatch" style="background:#1a0d3b" onclick="pickColor(this,'#1a0d3b')"></div>
      <div class="swatch" style="background:#2c2c2c" onclick="pickColor(this,'#2c2c2c')"></div>
      <div class="swatch" style="background:#b5451b" onclick="pickColor(this,'#b5451b')"></div>
      <div class="swatch" style="background:#c9a84c" onclick="pickColor(this,'#c9a84c')"></div>
      <div class="swatch" style="background:#2e5d8a" onclick="pickColor(this,'#2e5d8a')"></div>
    </div>
  </div>
  <button class="btn-gen" onclick="generateQR()">Generar QR ✦</button>
</div>

<div class="result-box" id="resultBox">
  <h2>✦ Tu QR está listo</h2>
  <div class="qr-wrap"><img id="qrimg" src="" alt="QR"></div>
  <div class="url-box" id="urlBox"></div>
  <p class="hint">Al escanearlo se abre tu tarjeta directamente.<br>También puedes compartir la URL de arriba.</p>
  <div class="actions">
    <button class="btn-sec" onclick="downloadQR()">⬇ Descargar QR</button>
    <button class="btn-sec" onclick="document.getElementById('resultBox').classList.remove('visible')">✏️ Editar</button>
  </div>
</div>

<script>
var photoDataURL = '';
var headerColor  = '#1a1a2e';
var BASE = 'https://serzap02.github.io/mi-tarjeta/card.html';

function loadPhoto(e){
  var file=e.target.files[0]; if(!file) return;
  // Redimensionar a max 80x80 para que la URL no sea enorme
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement('canvas');
    var max=80; var w=img.width,h=img.height;
    if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    photoDataURL=canvas.toDataURL('image/jpeg',0.5);
    var circle=document.getElementById('photoCircle');
    var i=circle.querySelector('img');
    if(!i){i=document.createElement('img');circle.appendChild(i);}
    i.src=photoDataURL;
  };
  img.src=URL.createObjectURL(file);
}

function pickColor(el,c){
  document.querySelectorAll('.swatch').forEach(function(s){s.classList.remove('selected');});
  el.classList.add('selected'); headerColor=c;
}

function v(id){return document.getElementById(id).value.trim();}

function generateQR(){
  var name=v('f_name');
  if(!name){alert('Introduce al menos tu nombre.');return;}

  // Construir URL con parámetros
  var params=new URLSearchParams();
  params.set('n', name);
  if(v('f_age'))    params.set('a', v('f_age'));
  if(v('f_sex'))    params.set('s', v('f_sex'));
  if(v('f_job'))    params.set('j', v('f_job'));
  if(v('f_social')) params.set('r', v('f_social'));
  if(v('f_desc'))   params.set('d', v('f_desc'));
  params.set('c', headerColor);
  if(photoDataURL)  params.set('p', photoDataURL);

  var cardURL = BASE + '?' + params.toString();
  var qrSrc   = 'https://api.qrserver.com/v1/create-qr-code/?size=230x230&ecc=M&data=' + encodeURIComponent(cardURL);

  document.getElementById('urlBox').textContent = cardURL;
  var img=document.getElementById('qrimg');
  img.src=qrSrc;
  document.getElementById('resultBox').classList.add('visible');
  document.getElementById('resultBox').scrollIntoView({behavior:'smooth'});
}

function downloadQR(){
  var img=document.getElementById('qrimg');
  fetch(img.src).then(function(r){return r.blob();}).then(function(b){
    var u=URL.createObjectURL(b);var a=document.createElement('a');
    a.href=u;a.download='mi-qr.png';a.click();URL.revokeObjectURL(u);
  }).catch(function(){window.open(img.src,'_blank');});
}
</script>
</body>
</html>
