<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0ebe0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{width:min(380px,100%);border-radius:28px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.18),0 0 0 1px rgba(201,168,76,.15)}
.header{height:130px;position:relative;display:flex;align-items:flex-end;padding:0 24px 18px}
.header::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(0,0,0,.55))}
.hname{font-family:'Playfair Display',serif;color:#fff;font-size:1.8rem;font-weight:900;position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.5);line-height:1.1}
.body{background:#fff;padding:20px 24px 28px;position:relative}
.avatar{width:82px;height:82px;border-radius:50%;object-fit:cover;border:3px solid #fff;position:absolute;top:-41px;right:22px;box-shadow:0 4px 18px rgba(0,0,0,.2)}
.avatar-ph{width:82px;height:82px;border-radius:50%;background:#e8e2d6;border:3px solid #fff;position:absolute;top:-41px;right:22px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;box-shadow:0 4px 18px rgba(0,0,0,.15)}
.job{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#b5451b;font-weight:600;margin-bottom:8px;margin-top:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{font-size:.73rem;background:rgba(181,69,27,.1);color:#b5451b;padding:3px 11px;border-radius:20px;font-weight:500}
.desc{font-size:.84rem;color:#555;line-height:1.65;border-left:2px solid #c9a84c;padding-left:11px;margin-bottom:14px}
hr{border:none;border-top:1px solid #eee;margin:14px 0}
.social-link{display:flex;align-items:center;gap:10px;font-size:.85rem;color:#2e5d8a;text-decoration:none;word-break:break-all}
.social-link:hover{text-decoration:underline}
.social-icon{width:30px;height:30px;background:#0d0d0d;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.footer{margin-top:20px;text-align:center;font-size:.7rem;color:#bbb;letter-spacing:.12em}
.back{display:inline-block;margin-top:20px;color:#c9a84c;font-size:.8rem;text-decoration:none;letter-spacing:.08em;border:1px solid rgba(201,168,76,.3);padding:8px 20px;border-radius:8px}
.back:hover{background:rgba(201,168,76,.1)}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header" id="hdr">
    <div class="hname" id="hname">—</div>
  </div>
  <div class="body">
    <div id="avatar_wrap"></div>
    <div class="job" id="job"></div>
    <div class="pills" id="pills"></div>
    <div class="desc" id="desc" style="display:none"></div>
    <hr id="divider" style="display:none">
    <a class="social-link" id="social" href="#" target="_blank" style="display:none">
      <div class="social-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
      <span id="social_text"></span>
    </a>
    <div class="footer">✦ Tarjeta Digital Personal</div>
  </div>
</div>
<a class="back" href="https://serzap02.github.io/mi-tarjeta/">✏️ Crear mi tarjeta</a>

<script>
var p = new URLSearchParams(window.location.search);
var name  = p.get('n') || 'Sin nombre';
var age   = p.get('a');
var sex   = p.get('s');
var job   = p.get('j');
var soc   = p.get('r');
var desc  = p.get('d');
var color = p.get('c') || '#1a1a2e';
var photo = p.get('p');

document.title = name + ' — Tarjeta Personal';
document.getElementById('hname').textContent = name;
document.getElementById('hdr').style.background = color;

// Avatar
var wrap = document.getElementById('avatar_wrap');
if(photo){
  var img = document.createElement('img');
  img.className='avatar'; img.src=photo; img.alt='foto';
  wrap.appendChild(img);
} else {
  var ph = document.createElement('div');
  ph.className='avatar-ph'; ph.textContent='👤';
  wrap.appendChild(ph);
}

// Job
if(job) document.getElementById('job').textContent = job;

// Pills
var pillsEl = document.getElementById('pills');
if(age){ var sp=document.createElement('span');sp.className='pill';sp.textContent=age+' años';pillsEl.appendChild(sp); }
if(sex){ var sp=document.createElement('span');sp.className='pill';sp.textContent=sex;pillsEl.appendChild(sp); }

// Desc
if(desc){
  var d=document.getElementById('desc');
  d.textContent=desc; d.style.display='block';
}

// Social
if(soc){
  var socEl=document.getElementById('social');
  var href=soc.startsWith('http')?soc:(soc.startsWith('@')?'https://instagram.com/'+soc.slice(1):'https://'+soc);
  socEl.href=href;
  document.getElementById('social_text').textContent=soc;
  socEl.style.display='flex';
  document.getElementById('divider').style.display='block';
}
</script>
</body>
</html>
